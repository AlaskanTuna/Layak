<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MyKad (synthetic) — Aisyah binti Ahmad</title>
    <style>
      @page {
        size: 85.6mm 54mm;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #2d3237;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: #0c1e3a;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
      }

      .card {
        width: 85.6mm;
        height: 54mm;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 50%),
          linear-gradient(180deg, #d5ecef 0%, #b5d9db 55%, #9fc9cf 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
        border-radius: 2.4mm;
      }

      @media print {
        body {
          background: #ffffff;
          padding: 0;
          display: block;
        }
        .card {
          box-shadow: none;
          margin: 0;
          border-radius: 0;
        }
      }

      /* Guilloche security background. */
      .security-bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.5;
        background-image:
          url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='80' height='30' viewBox='0 0 80 30'%3E%3Cg fill='none' stroke='%231c4a78' stroke-width='0.25'%3E%3Cpath d='M0 15 Q20 4 40 15 T80 15'/%3E%3Cpath d='M0 15 Q20 26 40 15 T80 15'/%3E%3Cpath d='M0 8 Q20 -3 40 8 T80 8'/%3E%3Cpath d='M0 22 Q20 33 40 22 T80 22'/%3E%3C/g%3E%3C/svg%3E"),
          url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'%3E%3Cg fill='none' stroke='%231c4a78' stroke-width='0.18'%3E%3Ccircle cx='18' cy='18' r='14'/%3E%3Ccircle cx='18' cy='18' r='10'/%3E%3Ccircle cx='18' cy='18' r='6'/%3E%3C/g%3E%3C/svg%3E");
        background-size:
          36mm 14mm,
          18mm 18mm;
        background-position:
          0 0,
          4mm 4mm;
      }

      .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at 50% 45%,
          transparent 0%,
          transparent 60%,
          rgba(10, 40, 65, 0.14) 100%
        );
      }

      /* ── Top strip: pink stamp on the left, MyKad+flag flush right ──── */
      .top-strip {
        position: absolute;
        top: 2mm;
        left: 3mm;
        right: 2.5mm;
        display: flex;
        align-items: flex-start;
        z-index: 2;
      }

      .title-stamp {
        background: #f0d3d9;
        border: 0.35mm solid #2a2e8c;
        width: 42mm;
        padding: 0.8mm 2mm 1mm;
        border-radius: 0.6mm;
        text-align: center;
        line-height: 1;
      }

      .title-stamp .row-1 {
        font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
        font-size: 2.2mm;
        color: #2a2e8c;
        letter-spacing: 0.3mm;
        margin-bottom: 0.35mm;
        display: block;
      }

      .title-stamp .row-2 {
        font-family: 'Times New Roman', Times, serif;
        font-size: 4.2mm;
        color: #2a2e8c;
        letter-spacing: 0.6mm;
        display: block;
        margin-bottom: 0.35mm;
      }

      .title-stamp .row-3 {
        font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
        font-size: 1.9mm;
        color: #2a2e8c;
        letter-spacing: 0.4mm;
        display: block;
      }

      .mykad-badge {
        display: flex;
        align-items: center;
        gap: 1.4mm;
        margin-left: auto;
        margin-top: 2mm;
      }

      .mykad-logo {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.4mm;
      }

      .mykad-word {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 3.4mm;
        color: #c8102e;
        letter-spacing: 0.1mm;
      }

      .mykad-check {
        width: 2.6mm;
        height: 2.6mm;
      }

      .flag {
        width: 11mm;
        height: 5.5mm;
        display: inline-block;
        vertical-align: middle;
        border: 0.12mm solid #6b7280;
      }

      /* ── Body ── one left column (data) + one right column (photo) ─── */
      .body {
        position: absolute;
        top: 17mm;
        left: 4mm;
        right: 4mm;
        bottom: 3mm;
        display: grid;
        grid-template-columns: 1fr 24mm;
        gap: 3mm;
        z-index: 2;
      }

      .ic {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 4.4mm;
        font-weight: 500;
        letter-spacing: 0.3mm;
        color: #111111;
        line-height: 1;
        margin-bottom: 2.2mm;
      }

      .chip {
        width: 9mm;
        height: 7mm;
        background:
          linear-gradient(135deg, #c9a34b 0%, #e1c17a 45%, #a7832f 100%);
        border: 0.2mm solid #7e5f20;
        border-radius: 0.4mm;
        margin-bottom: 2.6mm;
        position: relative;
      }

      .chip::before,
      .chip::after {
        content: '';
        position: absolute;
        background: rgba(80, 55, 10, 0.7);
      }

      .chip::before {
        top: 1mm;
        left: 0.8mm;
        right: 0.8mm;
        height: 0.18mm;
        box-shadow:
          0 1.4mm 0 rgba(80, 55, 10, 0.7),
          0 2.8mm 0 rgba(80, 55, 10, 0.7),
          0 4.2mm 0 rgba(80, 55, 10, 0.7);
      }

      .chip::after {
        top: 1mm;
        left: 4.3mm;
        width: 0.2mm;
        height: 5mm;
      }

      .name {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 2.5mm;
        font-weight: 400;
        color: #111111;
        letter-spacing: 0.15mm;
        margin-bottom: 1.4mm;
      }

      .address {
        font-size: 2mm;
        font-weight: 400;
        color: #111111;
        line-height: 1.3;
        letter-spacing: 0.05mm;
      }

      .photo-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      .photo {
        width: 24mm;
        height: 29mm;
        background: linear-gradient(180deg, #c2cdd4 0%, #9fadb8 100%);
        border: 0.18mm solid #7b8a96;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 1.8mm;
        color: #3a4a57;
        letter-spacing: 0.2mm;
        line-height: 1.15;
      }

      .status {
        margin-top: 1.4mm;
        font-size: 2mm;
        letter-spacing: 0.3mm;
        color: #111111;
        text-align: center;
      }

      .serial {
        position: absolute;
        bottom: 1.2mm;
        right: 2.2mm;
        font-size: 2mm;
        color: #111111;
        letter-spacing: 0.3mm;
        z-index: 2;
      }

      /* Diagonal "For Demo" watermark. */
      .wm-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 3;
      }

      .wm {
        position: absolute;
        left: 50%;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 7mm;
        font-weight: 500;
        letter-spacing: 1mm;
        color: rgba(200, 16, 46, 0.1);
        white-space: nowrap;
        transform-origin: center;
        transform: translate(-50%, -50%) rotate(-28deg);
      }

      .wm.top {
        top: 32%;
      }

      .wm.bot {
        top: 74%;
      }
    </style>
  </head>
  <body>
    <div class="card" role="img" aria-label="Synthetic Malaysian MyKad specimen for demo. Aisyah binti Ahmad.">
      <div class="security-bg" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <div class="top-strip">
        <div class="title-stamp">
          <span class="row-1">KAD PENGENALAN</span>
          <span class="row-2">MALAYSIA</span>
          <span class="row-3">IDENTITY CARD</span>
        </div>
        <div class="mykad-badge">
          <span class="mykad-logo">
            <span class="mykad-word">MyKad</span>
            <svg
              class="mykad-check"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#c8102e"
              stroke-width="3.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="4 13 10 19 20 6" />
            </svg>
          </span>
          <svg
            class="flag"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 140 70"
            preserveAspectRatio="none"
            aria-hidden="true"
          >
            <rect width="140" height="70" fill="#ffffff" />
            <g fill="#cc0033">
              <rect y="0" width="140" height="5" />
              <rect y="10" width="140" height="5" />
              <rect y="20" width="140" height="5" />
              <rect y="30" width="140" height="5" />
              <rect y="40" width="140" height="5" />
              <rect y="50" width="140" height="5" />
              <rect y="60" width="140" height="5" />
            </g>
            <rect width="70" height="35" fill="#010066" />
            <circle cx="28" cy="17.5" r="10" fill="#fcbf00" />
            <circle cx="32" cy="16.5" r="9" fill="#010066" />
            <polygon
              points="49,8 51,15 59,15 53,19 55,26 49,22 43,26 45,19 39,15 47,15"
              fill="#fcbf00"
            />
          </svg>
        </div>
      </div>

      <div class="body">
        <div>
          <div class="ic">900324-06-4321</div>
          <div class="chip" aria-hidden="true"></div>
          <div class="name">AISYAH BINTI AHMAD</div>
          <div class="address">
            NO. 42, JALAN IM 7/10<br />
            BANDAR INDERA MAHKOTA<br />
            25200 KUANTAN<br />
            PAHANG
          </div>
        </div>

        <div class="photo-col">
          <div class="photo">Photo<br />placeholder</div>
          <div class="status">WARGANEGARA</div>
        </div>
      </div>

      <div class="serial" aria-hidden="true">H</div>

      <div class="wm-layer" aria-hidden="true">
        <span class="wm top">For Demo</span>
        <span class="wm bot">For Demo</span>
      </div>
    </div>
  </body>
</html>
