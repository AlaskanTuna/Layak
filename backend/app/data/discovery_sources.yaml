# Discovery agent v1 source allowlist.
#
# Each entry pins one gazetted government URL that the source-watcher polls,
# hashes, and diffs against the last-seen content hash stored in the
# `verified_schemes` Firestore collection. A diff triggers the Gemini
# extractor; the extracted SchemeCandidate lands in `discovered_schemes`
# with status="pending" for admin review.
#
# Schema (Pydantic-validated on load by app.agents.tools.source_watcher):
#   id                       lower_snake_case key; matches `scheme_id` in
#                             backend/app/rules/<id>.py when the source maps
#                             to a scheme Layak already supports
#   name                     human-readable label shown in the admin UI
#   agency                   issuing agency acronym (MOF / JKM / LHDN / ...)
#   url                      authoritative source URL
#   content_selector         optional CSS selector to narrow the diffed
#                             content (falls through to the full body)
#   check_frequency_hours    polling cadence hint; v1 always polls every
#                             scheduled run, this is recorded for v2 cron
#
# Out of scope (v2 roadmap, per spec §2.4):
#   open-web crawling, dynamic allowlist editing in-product, RSS/Atom feeds.

